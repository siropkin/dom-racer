<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="144" y1="96" x2="908" y2="928" gradientUnits="userSpaceOnUse">
      <stop stop-color="#8B5CF6"/>
      <stop offset="0.52" stop-color="#2563EB"/>
      <stop offset="1" stop-color="#06B6D4"/>
    </linearGradient>
    <filter id="shadow" x="138" y="142" width="748" height="756" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="22" stdDeviation="26" flood-color="#0F172A" flood-opacity="0.28"/>
    </filter>
    <pattern id="grid" width="56" height="56" patternUnits="userSpaceOnUse">
      <path d="M56 0H0V56" stroke="#FFFFFF" stroke-opacity="0.08" stroke-width="2"/>
    </pattern>
  </defs>

  <rect x="72" y="72" width="880" height="880" rx="240" fill="url(#bg)"/>
  <rect x="72" y="72" width="880" height="880" rx="240" fill="url(#grid)"/>

  <g filter="url(#shadow)">
    <!-- Shadow under car -->
    <ellipse cx="512" cy="740" rx="200" ry="54" fill="#0F172A" fill-opacity="0.26"/>

    <!-- Wheels (top-down, black with white border) -->
    <rect x="334" y="264" width="64" height="32" rx="12" fill="#111827"/>
    <rect x="334" y="264" width="64" height="32" rx="12" stroke="#F8FAFC" stroke-width="8"/>
    <rect x="626" y="264" width="64" height="32" rx="12" fill="#111827"/>
    <rect x="626" y="264" width="64" height="32" rx="12" stroke="#F8FAFC" stroke-width="8"/>
    <rect x="334" y="644" width="64" height="32" rx="12" fill="#111827"/>
    <rect x="334" y="644" width="64" height="32" rx="12" stroke="#F8FAFC" stroke-width="8"/>
    <rect x="626" y="644" width="64" height="32" rx="12" fill="#111827"/>
    <rect x="626" y="644" width="64" height="32" rx="12" stroke="#F8FAFC" stroke-width="8"/>

    <!-- Main body (blue coupe) -->
    <rect x="344" y="214" width="336" height="520" rx="128" fill="#2563EB"/>
    <rect x="344" y="214" width="336" height="520" rx="128" stroke="#F8FAFC" stroke-width="12"/>

    <!-- Roof accent -->
    <rect x="418" y="184" width="188" height="580" rx="80" fill="#1D4ED8"/>
    <rect x="418" y="184" width="188" height="580" rx="80" stroke="#F8FAFC" stroke-width="8"/>

    <!-- Windshield (center horizontal stripe) -->
    <rect x="388" y="442" width="248" height="64" rx="8" fill="#E2E8F0"/>

    <!-- Side windows -->
    <rect x="448" y="328" width="128" height="292" rx="44" fill="#DBEAFE"/>

    <!-- Headlights (dark, front of car = top) -->
    <rect x="384" y="228" width="36" height="36" rx="8" fill="#111827"/>
    <rect x="604" y="228" width="36" height="36" rx="8" fill="#111827"/>

    <!-- Taillights (dark red, back of car = bottom) -->
    <rect x="384" y="684" width="36" height="36" rx="8" fill="#7F1D1D"/>
    <rect x="604" y="684" width="36" height="36" rx="8" fill="#7F1D1D"/>

    <!-- Body keyline -->
    <rect x="344" y="214" width="336" height="520" rx="128" stroke="rgba(15, 23, 42, 0.85)" stroke-width="6" fill="none"/>
  </g>

  <!-- Coin pickup -->
  <g>
    <circle cx="778" cy="272" r="64" fill="#FBBF24"/>
    <circle cx="778" cy="272" r="48" fill="#FDE68A"/>
    <path d="M778 238V306" stroke="#7C2D12" stroke-width="16" stroke-linecap="round"/>
    <path d="M744 272H812" stroke="#7C2D12" stroke-width="16" stroke-linecap="round"/>
  </g>

  <!-- Sparkles -->
  <g fill="#FFFFFF">
    <path d="M254 212L266 244L298 256L266 268L254 300L242 268L210 256L242 244L254 212Z" fill-opacity="0.88"/>
    <path d="M188 544L196 564L216 572L196 580L188 600L180 580L160 572L180 564L188 544Z" fill-opacity="0.72"/>
    <path d="M820 650L830 676L856 686L830 696L820 722L810 696L784 686L810 676L820 650Z" fill-opacity="0.82"/>
  </g>

  <rect x="142" y="142" width="740" height="740" rx="208" stroke="#FFFFFF" stroke-opacity="0.18" stroke-width="8"/>
</svg>
