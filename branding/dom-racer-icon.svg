<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="100" y1="72" x2="920" y2="952" gradientUnits="userSpaceOnUse">
      <stop stop-color="#7c3aed"/>
      <stop offset="0.5" stop-color="#2563eb"/>
      <stop offset="1" stop-color="#06b6d4"/>
    </linearGradient>
    <pattern id="grid" width="52" height="52" patternUnits="userSpaceOnUse">
      <path d="M52 0H0V52" stroke="#fff" stroke-opacity="0.07" stroke-width="1.5"/>
    </pattern>
    <filter id="sh" filterUnits="objectBoundingBox" x="-15%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#020617" flood-opacity="0.32"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect x="72" y="72" width="880" height="880" rx="220" fill="url(#bg)"/>
  <rect x="72" y="72" width="880" height="880" rx="220" fill="url(#grid)"/>

  <!-- Car (front=top, centered at ~512,478) -->
  <g filter="url(#sh)">
    <!-- Wheels (extend beyond body edges) -->
    <rect x="348" y="312" width="52" height="24" rx="9" fill="#111827" stroke="#f8fafc" stroke-width="5"/>
    <rect x="624" y="312" width="52" height="24" rx="9" fill="#111827" stroke="#f8fafc" stroke-width="5"/>
    <rect x="348" y="612" width="52" height="24" rx="9" fill="#111827" stroke="#f8fafc" stroke-width="5"/>
    <rect x="624" y="612" width="52" height="24" rx="9" fill="#111827" stroke="#f8fafc" stroke-width="5"/>

    <!-- Body -->
    <rect x="376" y="268" width="272" height="416" rx="86" fill="#2563eb" stroke="#f8fafc" stroke-width="9"/>

    <!-- Cabin roof (inside body, darker) -->
    <rect x="412" y="336" width="200" height="280" rx="48" fill="#1d4ed8"/>

    <!-- Windshield (front glass, upper cabin area) -->
    <rect x="416" y="362" width="192" height="44" rx="10" fill="#dbeafe"/>

    <!-- Rear window (lower cabin area) -->
    <rect x="426" y="558" width="172" height="36" rx="10" fill="#dbeafe" fill-opacity="0.6"/>

    <!-- Headlights (front = top of car) -->
    <rect x="404" y="282" width="30" height="26" rx="8" fill="#cbd5e1"/>
    <rect x="590" y="282" width="30" height="26" rx="8" fill="#cbd5e1"/>

    <!-- Taillights (rear = bottom of car) -->
    <rect x="404" y="648" width="30" height="26" rx="8" fill="#ef4444"/>
    <rect x="590" y="648" width="30" height="26" rx="8" fill="#ef4444"/>

    <!-- Body keyline -->
    <rect x="376" y="268" width="272" height="416" rx="86" stroke="rgba(15,23,42,0.5)" stroke-width="4" fill="none"/>
  </g>

  <!-- Coin -->
  <circle cx="752" cy="296" r="56" fill="#fbbf24"/>
  <circle cx="752" cy="296" r="40" fill="#fde68a"/>
  <ellipse cx="738" cy="280" rx="14" ry="9" fill="#fff" fill-opacity="0.4" transform="rotate(-20 738 280)"/>

  <!-- Sparkles -->
  <g fill="#fff">
    <path d="M260 224L272 256L304 268L272 280L260 312L248 280L216 268L248 256Z" fill-opacity="0.85"/>
    <path d="M196 530L204 552L226 560L204 568L196 590L188 568L166 560L188 552Z" fill-opacity="0.6"/>
    <path d="M808 630L816 652L838 660L816 668L808 690L800 668L778 660L800 652Z" fill-opacity="0.7"/>
  </g>

  <!-- Inner border highlight -->
  <rect x="84" y="84" width="856" height="856" rx="210" stroke="#fff" stroke-opacity="0.14" stroke-width="6" fill="none"/>
</svg>
