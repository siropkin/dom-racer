<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="100" y1="72" x2="920" y2="952" gradientUnits="userSpaceOnUse">
      <stop stop-color="#7c3aed"/>
      <stop offset="0.5" stop-color="#2563eb"/>
      <stop offset="1" stop-color="#06b6d4"/>
    </linearGradient>
    <pattern id="grid" width="52" height="52" patternUnits="userSpaceOnUse">
      <path d="M52 0H0V52" stroke="#fff" stroke-opacity="0.07" stroke-width="1.5"/>
    </pattern>
    <filter id="sh" filterUnits="objectBoundingBox" x="-15%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#020617" flood-opacity="0.32"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect x="72" y="72" width="880" height="880" rx="220" fill="url(#bg)"/>
  <rect x="72" y="72" width="880" height="880" rx="220" fill="url(#grid)"/>

  <!-- Top-down coupe (cross-shaped silhouette, facing up, centered ~512,476) -->
  <g filter="url(#sh)">
    <!-- Wheels (4 corners, outside body but inside cabin width) -->
    <rect x="340" y="326" width="24" height="54" rx="9" fill="#111827" stroke="#f8fafc" stroke-width="5"/>
    <rect x="660" y="326" width="24" height="54" rx="9" fill="#111827" stroke="#f8fafc" stroke-width="5"/>
    <rect x="340" y="570" width="24" height="54" rx="9" fill="#111827" stroke="#f8fafc" stroke-width="5"/>
    <rect x="660" y="570" width="24" height="54" rx="9" fill="#111827" stroke="#f8fafc" stroke-width="5"/>

    <!-- Body (narrower vertical bar of the cross) -->
    <rect x="392" y="308" width="240" height="352" rx="80" fill="#2563eb" stroke="#f8fafc" stroke-width="9"/>

    <!-- Cabin roof (wider horizontal bar — extends past body, forming the cross) -->
    <rect x="344" y="388" width="336" height="192" rx="56" fill="#1d4ed8" stroke="#f8fafc" stroke-width="7"/>

    <!-- Center stripe (vertical along car length) -->
    <rect x="492" y="368" width="40" height="232" rx="4" fill="#e2e8f0"/>

    <!-- Windshield (front glass, upper-center of cabin) -->
    <rect x="402" y="420" width="220" height="64" rx="16" fill="#dbeafe"/>

    <!-- Rear window (lower-center of cabin) -->
    <rect x="418" y="508" width="188" height="44" rx="12" fill="#dbeafe" fill-opacity="0.55"/>

    <!-- Headlights (front of car = top) -->
    <rect x="430" y="314" width="30" height="26" rx="8" fill="#cbd5e1"/>
    <rect x="564" y="314" width="30" height="26" rx="8" fill="#cbd5e1"/>

    <!-- Taillights (rear of car = bottom) -->
    <rect x="430" y="628" width="30" height="26" rx="8" fill="#ef4444"/>
    <rect x="564" y="628" width="30" height="26" rx="8" fill="#ef4444"/>

    <!-- Body contour keyline -->
    <rect x="392" y="308" width="240" height="352" rx="80" stroke="rgba(15,23,42,0.5)" stroke-width="4" fill="none"/>
  </g>

  <!-- Coin -->
  <circle cx="752" cy="296" r="56" fill="#fbbf24"/>
  <circle cx="752" cy="296" r="40" fill="#fde68a"/>
  <ellipse cx="738" cy="280" rx="14" ry="9" fill="#fff" fill-opacity="0.4" transform="rotate(-20 738 280)"/>

  <!-- Sparkles -->
  <g fill="#fff">
    <path d="M260 224L272 256L304 268L272 280L260 312L248 280L216 268L248 256Z" fill-opacity="0.85"/>
    <path d="M196 530L204 552L226 560L204 568L196 590L188 568L166 560L188 552Z" fill-opacity="0.6"/>
    <path d="M808 630L816 652L838 660L816 668L808 690L800 668L778 660L800 652Z" fill-opacity="0.7"/>
  </g>

  <!-- Inner border highlight -->
  <rect x="84" y="84" width="856" height="856" rx="210" stroke="#fff" stroke-opacity="0.14" stroke-width="6" fill="none"/>
</svg>
