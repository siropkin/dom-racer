<svg width="440" height="280" viewBox="0 0 440 280" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="440" y2="280" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0f172a"/>
      <stop offset="0.5" stop-color="#1e1b4b"/>
      <stop offset="1" stop-color="#164e63"/>
    </linearGradient>
    <linearGradient id="panel" x1="16" y1="24" x2="170" y2="252" gradientUnits="userSpaceOnUse">
      <stop stop-color="#7c3aed"/>
      <stop offset="1" stop-color="#2563eb"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect x="8" y="8" width="424" height="264" rx="32" fill="url(#bg)"/>

  <!-- Decorative sweeps -->
  <path d="M30 216C80 168 140 140 200 128C250 118 320 108 420 82" stroke="#67e8f9" stroke-opacity="0.16" stroke-width="14" stroke-linecap="round"/>
  <path d="M24 78C54 96 78 116 108 144" stroke="#a78bfa" stroke-opacity="0.16" stroke-width="10" stroke-linecap="round"/>

  <!-- Left panel with car -->
  <rect x="18" y="28" width="148" height="224" rx="30" fill="url(#panel)"/>
  <rect x="18" y="28" width="148" height="224" rx="30" stroke="#fff" stroke-opacity="0.12"/>

  <!-- Coupe in panel (cross-shaped, centered ~92, 132, scale ~3.5x, facing up) -->
  <!-- Wheels -->
  <rect x="63" y="102" width="6" height="14" rx="2" fill="#111827" stroke="#f8fafc" stroke-width="1.2"/>
  <rect x="115" y="102" width="6" height="14" rx="2" fill="#111827" stroke="#f8fafc" stroke-width="1.2"/>
  <rect x="63" y="148" width="6" height="14" rx="2" fill="#111827" stroke="#f8fafc" stroke-width="1.2"/>
  <rect x="115" y="148" width="6" height="14" rx="2" fill="#111827" stroke="#f8fafc" stroke-width="1.2"/>
  <!-- Body (narrow vertical bar) -->
  <rect x="72" y="96" width="40" height="74" rx="14" fill="#2563eb" stroke="#f8fafc" stroke-width="2"/>
  <!-- Cabin (wider horizontal bar — cross shape) -->
  <rect x="62" y="116" width="60" height="34" rx="10" fill="#1d4ed8" stroke="#f8fafc" stroke-width="1.6"/>
  <!-- Center stripe -->
  <rect x="88" y="106" width="8" height="54" rx="1" fill="#e2e8f0"/>
  <!-- Windshield -->
  <rect x="72" y="124" width="40" height="10" rx="3" fill="#dbeafe"/>
  <!-- Rear window -->
  <rect x="76" y="140" width="32" height="6" rx="2" fill="#dbeafe" fill-opacity="0.55"/>
  <!-- Headlights -->
  <rect x="80" y="98" width="7" height="5" rx="1.5" fill="#cbd5e1"/>
  <rect x="97" y="98" width="7" height="5" rx="1.5" fill="#cbd5e1"/>
  <!-- Taillights -->
  <rect x="80" y="162" width="7" height="5" rx="1.5" fill="#ef4444"/>
  <rect x="97" y="162" width="7" height="5" rx="1.5" fill="#ef4444"/>

  <!-- Coin -->
  <circle cx="136" cy="74" r="12" fill="#fbbf24"/>
  <circle cx="136" cy="74" r="8.5" fill="#fde68a"/>
  <ellipse cx="133" cy="71" rx="3.5" ry="2.5" fill="#fff" fill-opacity="0.35" transform="rotate(-15 133 71)"/>

  <!-- Sparkle -->
  <path d="M36 60L40 72L52 76L40 80L36 92L32 80L20 76L32 72Z" fill="#fff" fill-opacity="0.65"/>

  <!-- Text content (right side) -->
  <text x="184" y="90" fill="#f8fafc" font-size="30" font-weight="800" font-family="Arial, Helvetica, sans-serif">DOM Racer</text>
  <text x="184" y="114" fill="#94a3b8" font-size="13" font-weight="500" font-family="Arial, Helvetica, sans-serif">Every page is a racetrack.</text>

  <!-- Feature pills -->
  <rect x="184" y="136" width="70" height="26" rx="13" fill="#111827" fill-opacity="0.6" stroke="#fff" stroke-opacity="0.1"/>
  <text x="219" y="154" text-anchor="middle" fill="#fde68a" font-size="11" font-weight="700" font-family="Arial, sans-serif">LOOT</text>

  <rect x="260" y="136" width="78" height="26" rx="13" fill="#111827" fill-opacity="0.6" stroke="#fff" stroke-opacity="0.1"/>
  <text x="299" y="154" text-anchor="middle" fill="#fca5a5" font-size="11" font-weight="700" font-family="Arial, sans-serif">POLICE</text>

  <rect x="344" y="136" width="76" height="26" rx="13" fill="#111827" fill-opacity="0.6" stroke="#fff" stroke-opacity="0.1"/>
  <text x="382" y="154" text-anchor="middle" fill="#93c5fd" font-size="11" font-weight="700" font-family="Arial, sans-serif">POWERS</text>

  <rect x="184" y="170" width="76" height="26" rx="13" fill="#111827" fill-opacity="0.6" stroke="#fff" stroke-opacity="0.1"/>
  <text x="222" y="188" text-anchor="middle" fill="#86efac" font-size="11" font-weight="700" font-family="Arial, sans-serif">GOALS</text>

  <rect x="266" y="170" width="78" height="26" rx="13" fill="#111827" fill-opacity="0.6" stroke="#fff" stroke-opacity="0.1"/>
  <text x="305" y="188" text-anchor="middle" fill="#a78bfa" font-size="11" font-weight="700" font-family="Arial, sans-serif">PLANES</text>

  <!-- Hotkey hint -->
  <rect x="184" y="218" width="110" height="24" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="239" y="234" text-anchor="middle" fill="#64748b" font-size="11" font-weight="700" font-family="monospace">Shift + Space</text>
  <text x="302" y="234" fill="#475569" font-size="11" font-weight="500" font-family="Arial, sans-serif">to play</text>
</svg>
