<svg width="440" height="280" viewBox="0 0 440 280" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="bg-clip">
      <rect x="8" y="8" width="424" height="264" rx="32"/>
    </clipPath>
  </defs>

  <!-- Pixel-art background: 8 stepped horizontal bands (dark → indigo → teal) -->
  <g clip-path="url(#bg-clip)">
    <rect x="8" y="8"   width="424" height="33" fill="#020617"/>
    <rect x="8" y="41"  width="424" height="33" fill="#070820"/>
    <rect x="8" y="74"  width="424" height="33" fill="#0d0c2c"/>
    <rect x="8" y="107" width="424" height="33" fill="#151339"/>
    <rect x="8" y="140" width="424" height="33" fill="#1e1b4b"/>
    <rect x="8" y="173" width="424" height="33" fill="#1a2c58"/>
    <rect x="8" y="206" width="424" height="33" fill="#124c6c"/>
    <rect x="8" y="239" width="424" height="33" fill="#0e7490"/>
  </g>

  <!-- Pixel-art "DOM" (scale 9) -->
  <g fill="#f8fafc" transform="translate(135, 42) scale(9)">
    <rect x="0" y="0" width="4" height="1"/>
    <rect x="0" y="1" width="1" height="3"/>
    <rect x="4" y="1" width="1" height="3"/>
    <rect x="0" y="4" width="4" height="1"/>
    <rect x="8" y="0" width="3" height="1"/>
    <rect x="7" y="1" width="1" height="3"/>
    <rect x="11" y="1" width="1" height="3"/>
    <rect x="8" y="4" width="3" height="1"/>
    <rect x="14" y="0" width="1" height="5"/>
    <rect x="18" y="0" width="1" height="5"/>
    <rect x="15" y="1" width="1" height="1"/>
    <rect x="17" y="1" width="1" height="1"/>
    <rect x="16" y="2" width="1" height="1"/>
  </g>

  <!-- Pixel-art "RACER" (scale 9) -->
  <g fill="#f8fafc" transform="translate(90, 96) scale(9)">
    <rect x="0" y="0" width="1" height="5"/>
    <rect x="1" y="0" width="3" height="1"/>
    <rect x="4" y="1" width="1" height="1"/>
    <rect x="1" y="2" width="3" height="1"/>
    <rect x="3" y="3" width="1" height="1"/>
    <rect x="4" y="4" width="1" height="1"/>
    <rect x="7" y="0" width="3" height="1"/>
    <rect x="6" y="1" width="1" height="1"/>
    <rect x="10" y="1" width="1" height="1"/>
    <rect x="6" y="2" width="5" height="1"/>
    <rect x="6" y="3" width="1" height="2"/>
    <rect x="10" y="3" width="1" height="2"/>
    <rect x="13" y="0" width="4" height="1"/>
    <rect x="12" y="1" width="1" height="3"/>
    <rect x="13" y="4" width="4" height="1"/>
    <rect x="18" y="0" width="1" height="5"/>
    <rect x="19" y="0" width="4" height="1"/>
    <rect x="19" y="2" width="3" height="1"/>
    <rect x="19" y="4" width="4" height="1"/>
    <rect x="24" y="0" width="1" height="5"/>
    <rect x="25" y="0" width="3" height="1"/>
    <rect x="28" y="1" width="1" height="1"/>
    <rect x="25" y="2" width="3" height="1"/>
    <rect x="27" y="3" width="1" height="1"/>
    <rect x="28" y="4" width="1" height="1"/>
  </g>

  <!-- Pixel divider dots -->
  <g fill="#94a3b8" fill-opacity="0.5">
    <rect x="160" y="152" width="4" height="4"/>
    <rect x="172" y="152" width="4" height="4"/>
    <rect x="184" y="152" width="4" height="4"/>
    <rect x="196" y="152" width="20" height="4"/>
    <rect x="224" y="152" width="4" height="4"/>
    <rect x="236" y="152" width="20" height="4"/>
    <rect x="264" y="152" width="4" height="4"/>
    <rect x="276" y="152" width="4" height="4"/>
  </g>

  <!-- Feature pills -->
  <rect x="72" y="172" width="62" height="24" rx="2" fill="#111827" fill-opacity="0.6" stroke="#fff" stroke-opacity="0.1"/>
  <text x="103" y="189" text-anchor="middle" fill="#fde68a" font-size="10" font-weight="700" font-family="monospace">LOOT</text>
  <rect x="140" y="172" width="70" height="24" rx="2" fill="#111827" fill-opacity="0.6" stroke="#fff" stroke-opacity="0.1"/>
  <text x="175" y="189" text-anchor="middle" fill="#fca5a5" font-size="10" font-weight="700" font-family="monospace">POLICE</text>
  <rect x="216" y="172" width="70" height="24" rx="2" fill="#111827" fill-opacity="0.6" stroke="#fff" stroke-opacity="0.1"/>
  <text x="251" y="189" text-anchor="middle" fill="#93c5fd" font-size="10" font-weight="700" font-family="monospace">POWERS</text>
  <rect x="292" y="172" width="70" height="24" rx="2" fill="#111827" fill-opacity="0.6" stroke="#fff" stroke-opacity="0.1"/>
  <text x="327" y="189" text-anchor="middle" fill="#86efac" font-size="10" font-weight="700" font-family="monospace">GOALS</text>

  <!-- Hotkey hint -->
  <rect x="120" y="212" width="200" height="22" rx="2" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="220" y="227" text-anchor="middle" fill="#64748b" font-size="10" font-weight="700" font-family="monospace">Shift + Space to play</text>

  <!-- Single pixel coin (top-right accent) -->
  <g fill="#fbbf24" transform="translate(380, 40) scale(7)">
    <rect x="1" y="0" width="1" height="1"/>
    <rect x="0" y="1" width="3" height="1"/>
    <rect x="1" y="2" width="1" height="1"/>
  </g>
  <rect x="387" y="47" width="7" height="7" fill="#fde68a"/>
</svg>
