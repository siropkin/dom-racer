<svg width="440" height="280" viewBox="0 0 440 280" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="440" y2="280" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0f172a"/>
      <stop offset="0.5" stop-color="#1e1b4b"/>
      <stop offset="1" stop-color="#164e63"/>
    </linearGradient>
    <linearGradient id="panel" x1="16" y1="24" x2="170" y2="252" gradientUnits="userSpaceOnUse">
      <stop stop-color="#7c3aed"/>
      <stop offset="1" stop-color="#2563eb"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect x="8" y="8" width="424" height="264" rx="32" fill="url(#bg)"/>

  <!-- Decorative sweeps -->
  <path d="M30 216C80 168 140 140 200 128C250 118 320 108 420 82" stroke="#67e8f9" stroke-opacity="0.16" stroke-width="14" stroke-linecap="round"/>
  <path d="M24 78C54 96 78 116 108 144" stroke="#a78bfa" stroke-opacity="0.16" stroke-width="10" stroke-linecap="round"/>

  <!-- Left panel with car -->
  <rect x="18" y="28" width="148" height="224" rx="30" fill="url(#panel)"/>
  <rect x="18" y="28" width="148" height="224" rx="30" stroke="#fff" stroke-opacity="0.12"/>

  <!-- Car in panel (centered ~92, 132) -->
  <!-- Wheels -->
  <rect x="63" y="96" width="9" height="4" rx="1.5" fill="#111827" stroke="#f8fafc" stroke-width="1.2"/>
  <rect x="112" y="96" width="9" height="4" rx="1.5" fill="#111827" stroke="#f8fafc" stroke-width="1.2"/>
  <rect x="63" y="160" width="9" height="4" rx="1.5" fill="#111827" stroke="#f8fafc" stroke-width="1.2"/>
  <rect x="112" y="160" width="9" height="4" rx="1.5" fill="#111827" stroke="#f8fafc" stroke-width="1.2"/>
  <!-- Body -->
  <rect x="68" y="90" width="48" height="74" rx="16" fill="#2563eb" stroke="#f8fafc" stroke-width="2"/>
  <!-- Cabin -->
  <rect x="75" y="100" width="34" height="50" rx="10" fill="#1d4ed8"/>
  <!-- Windshield -->
  <rect x="76" y="106" width="32" height="8" rx="2" fill="#dbeafe"/>
  <!-- Rear window -->
  <rect x="78" y="140" width="28" height="6" rx="2" fill="#dbeafe" fill-opacity="0.55"/>
  <!-- Headlights -->
  <rect x="76" y="92" width="5" height="4" rx="1.5" fill="#cbd5e1"/>
  <rect x="103" y="92" width="5" height="4" rx="1.5" fill="#cbd5e1"/>
  <!-- Taillights -->
  <rect x="76" y="158" width="5" height="4" rx="1.5" fill="#ef4444"/>
  <rect x="103" y="158" width="5" height="4" rx="1.5" fill="#ef4444"/>

  <!-- Coin -->
  <circle cx="136" cy="74" r="12" fill="#fbbf24"/>
  <circle cx="136" cy="74" r="8.5" fill="#fde68a"/>
  <ellipse cx="133" cy="71" rx="3.5" ry="2.5" fill="#fff" fill-opacity="0.35" transform="rotate(-15 133 71)"/>

  <!-- Sparkle -->
  <path d="M36 60L40 72L52 76L40 80L36 92L32 80L20 76L32 72Z" fill="#fff" fill-opacity="0.65"/>

  <!-- Text content (right side) -->
  <text x="184" y="90" fill="#f8fafc" font-size="30" font-weight="800" font-family="Arial, Helvetica, sans-serif">DOM Racer</text>
  <text x="184" y="114" fill="#94a3b8" font-size="13" font-weight="500" font-family="Arial, Helvetica, sans-serif">Every page is a racetrack.</text>

  <!-- Feature pills -->
  <rect x="184" y="136" width="70" height="26" rx="13" fill="#111827" fill-opacity="0.6" stroke="#fff" stroke-opacity="0.1"/>
  <text x="219" y="154" text-anchor="middle" fill="#fde68a" font-size="11" font-weight="700" font-family="Arial, sans-serif">LOOT</text>

  <rect x="260" y="136" width="78" height="26" rx="13" fill="#111827" fill-opacity="0.6" stroke="#fff" stroke-opacity="0.1"/>
  <text x="299" y="154" text-anchor="middle" fill="#fca5a5" font-size="11" font-weight="700" font-family="Arial, sans-serif">POLICE</text>

  <rect x="344" y="136" width="76" height="26" rx="13" fill="#111827" fill-opacity="0.6" stroke="#fff" stroke-opacity="0.1"/>
  <text x="382" y="154" text-anchor="middle" fill="#93c5fd" font-size="11" font-weight="700" font-family="Arial, sans-serif">POWERS</text>

  <rect x="184" y="170" width="82" height="26" rx="13" fill="#111827" fill-opacity="0.6" stroke="#fff" stroke-opacity="0.1"/>
  <text x="225" y="188" text-anchor="middle" fill="#86efac" font-size="11" font-weight="700" font-family="Arial, sans-serif">COMBOS</text>

  <rect x="272" y="170" width="78" height="26" rx="13" fill="#111827" fill-opacity="0.6" stroke="#fff" stroke-opacity="0.1"/>
  <text x="311" y="188" text-anchor="middle" fill="#a78bfa" font-size="11" font-weight="700" font-family="Arial, sans-serif">PLANES</text>

  <!-- Hotkey hint -->
  <rect x="184" y="218" width="84" height="24" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="226" y="234" text-anchor="middle" fill="#64748b" font-size="11" font-weight="700" font-family="monospace">Shift + R</text>
  <text x="276" y="234" fill="#475569" font-size="11" font-weight="500" font-family="Arial, sans-serif">to play</text>
</svg>
