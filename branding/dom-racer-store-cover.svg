<svg width="1280" height="800" viewBox="0 0 1280 800" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="64" y1="0" x2="1200" y2="800" gradientUnits="userSpaceOnUse">
      <stop stop-color="#020617"/>
      <stop offset="0.48" stop-color="#1e1b4b"/>
      <stop offset="1" stop-color="#0e7490"/>
    </linearGradient>
    <linearGradient id="browser" x1="160" y1="100" x2="1120" y2="640" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0f172a"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="arena" x1="190" y1="170" x2="1080" y2="620" gradientUnits="userSpaceOnUse">
      <stop stop-color="#111827"/>
      <stop offset="1" stop-color="#1e293b"/>
    </linearGradient>
    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse">
      <path d="M36 0H0V36" stroke="#fff" stroke-opacity="0.05" stroke-width="1.2"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1280" height="800" fill="url(#bg)"/>
  <path d="M72 640C252 540 400 450 580 418C780 382 1000 420 1210 580" stroke="#67e8f9" stroke-opacity="0.1" stroke-width="24" stroke-linecap="round"/>
  <path d="M140 110C340 165 450 250 620 380" stroke="#a78bfa" stroke-opacity="0.1" stroke-width="16" stroke-linecap="round"/>

  <!-- Browser window -->
  <rect x="160" y="100" width="960" height="520" rx="28" fill="url(#browser)" stroke="#fff" stroke-opacity="0.1" stroke-width="1.5"/>

  <!-- Title bar -->
  <rect x="160" y="100" width="960" height="48" rx="28" fill="#0b1120"/>
  <circle cx="194" cy="124" r="7" fill="#fb7185"/>
  <circle cx="218" cy="124" r="7" fill="#fbbf24"/>
  <circle cx="242" cy="124" r="7" fill="#34d399"/>
  <rect x="276" y="111" width="280" height="24" rx="12" fill="#111827" stroke="#fff" stroke-opacity="0.06"/>
  <text x="302" y="128" fill="#64748b" font-size="12" font-weight="500" font-family="Arial, sans-serif">https://example.com</text>

  <!-- Game arena -->
  <rect x="190" y="164" width="900" height="428" rx="20" fill="url(#arena)"/>
  <rect x="190" y="164" width="900" height="428" rx="20" fill="url(#grid)"/>

  <!-- HUD: Score/Time -->
  <rect x="218" y="190" width="140" height="72" rx="16" fill="#0f172a" fill-opacity="0.8" stroke="#fff" stroke-opacity="0.08"/>
  <text x="238" y="218" fill="#e2e8f0" font-size="16" font-weight="800" font-family="Arial, sans-serif">TIME 01:28</text>
  <text x="238" y="244" fill="#fde68a" font-size="16" font-weight="700" font-family="Arial, sans-serif">SCORE 170</text>

  <!-- HUD: Powers -->
  <rect x="912" y="186" width="150" height="100" rx="16" fill="#0f172a" fill-opacity="0.8" stroke="#fff" stroke-opacity="0.08"/>
  <text x="932" y="214" fill="#bfdbfe" font-size="14" font-weight="800" font-family="Arial, sans-serif">POWERS</text>
  <rect x="932" y="226" width="110" height="14" rx="7" fill="#1e293b"/>
  <rect x="932" y="226" width="88" height="14" rx="7" fill="#22d3ee"/>
  <text x="932" y="264" fill="#fca5a5" font-size="13" font-weight="700" font-family="Arial, sans-serif">BLACKOUT 04s</text>

  <!-- HUD: Best scores -->
  <rect x="920" y="496" width="146" height="68" rx="16" fill="#0f172a" fill-opacity="0.8" stroke="#fff" stroke-opacity="0.08"/>
  <text x="940" y="522" fill="#e2e8f0" font-size="13" font-weight="700" font-family="Arial, sans-serif">PAGE BEST 240</text>
  <text x="940" y="544" fill="#64748b" font-size="12" font-weight="600" font-family="Arial, sans-serif">LIFE BEST 780</text>

  <!-- DOM elements -->
  <rect x="264" y="314" width="116" height="68" rx="16" fill="#1e293b" stroke="#a78bfa" stroke-opacity="0.22"/>
  <text x="292" y="354" fill="#e9d5ff" font-size="16" font-weight="700" font-family="Arial, sans-serif">&lt;div&gt;</text>

  <rect x="424" y="240" width="172" height="36" rx="18" fill="#1e293b" stroke="#fcd34d" stroke-opacity="0.22"/>
  <text x="462" y="264" fill="#fde68a" font-size="14" font-weight="700" font-family="Arial, sans-serif">Link loot</text>

  <rect x="820" y="356" width="100" height="42" rx="14" fill="#1e3a8a" stroke="#93c5fd" stroke-opacity="0.35"/>
  <text x="840" y="382" fill="#dbeafe" font-size="14" font-weight="700" font-family="Arial, sans-serif">Button</text>

  <rect x="448" y="444" width="148" height="88" rx="18" fill="#0f172a" stroke="#67e8f9" stroke-opacity="0.2"/>
  <text x="480" y="494" fill="#a5f3fc" font-size="15" font-weight="700" font-family="Arial, sans-serif">Boost zone</text>

  <!-- Coin -->
  <circle cx="772" cy="250" r="20" fill="#fbbf24"/>
  <circle cx="772" cy="250" r="14" fill="#fde68a"/>
  <ellipse cx="768" cy="244" rx="5" ry="3.5" fill="#fff" fill-opacity="0.35" transform="rotate(-18 768 244)"/>

  <!-- Car in gameplay (centered ~660, 390) -->
  <!-- Wheels -->
  <rect x="618" y="318" width="18" height="8" rx="3" fill="#111827" stroke="#f8fafc" stroke-width="2"/>
  <rect x="696" y="318" width="18" height="8" rx="3" fill="#111827" stroke="#f8fafc" stroke-width="2"/>
  <rect x="618" y="432" width="18" height="8" rx="3" fill="#111827" stroke="#f8fafc" stroke-width="2"/>
  <rect x="696" y="432" width="18" height="8" rx="3" fill="#111827" stroke="#f8fafc" stroke-width="2"/>
  <!-- Body -->
  <rect x="626" y="310" width="80" height="128" rx="28" fill="#2563eb" stroke="#f8fafc" stroke-width="3.5"/>
  <!-- Cabin -->
  <rect x="638" y="334" width="56" height="84" rx="16" fill="#1d4ed8"/>
  <!-- Windshield -->
  <rect x="640" y="342" width="52" height="14" rx="3" fill="#dbeafe"/>
  <!-- Rear window -->
  <rect x="644" y="402" width="44" height="10" rx="3" fill="#dbeafe" fill-opacity="0.55"/>
  <!-- Headlights -->
  <rect x="640" y="314" width="10" height="8" rx="2.5" fill="#cbd5e1"/>
  <rect x="682" y="314" width="10" height="8" rx="2.5" fill="#cbd5e1"/>
  <!-- Taillights -->
  <rect x="640" y="428" width="10" height="8" rx="2.5" fill="#ef4444"/>
  <rect x="682" y="428" width="10" height="8" rx="2.5" fill="#ef4444"/>

  <!-- Police warning -->
  <text x="946" y="424" fill="#fca5a5" font-size="18" font-weight="800" font-family="Arial, sans-serif">WEE-OO</text>
  <path d="M1030 390L1068 372" stroke="#fca5a5" stroke-width="7" stroke-linecap="round"/>
  <path d="M1038 370L1068 372L1048 402" stroke="#fca5a5" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Title -->
  <text x="160" y="704" fill="#f8fafc" font-size="48" font-weight="900" font-family="Arial, Helvetica, sans-serif">DOM Racer</text>
  <text x="160" y="742" fill="#94a3b8" font-size="20" font-weight="500" font-family="Arial, Helvetica, sans-serif">Turn any webpage into a tiny arcade track.</text>

  <!-- Sparkles -->
  <g fill="#fff">
    <path d="M1100 82L1110 108L1136 118L1110 128L1100 154L1090 128L1064 118L1090 108Z" fill-opacity="0.78"/>
    <path d="M1186 218L1194 238L1214 246L1194 254L1186 274L1178 254L1158 246L1178 238Z" fill-opacity="0.58"/>
  </g>
</svg>
